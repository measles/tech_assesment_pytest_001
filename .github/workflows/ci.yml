name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_call:
    inputs:
      config-path:
        required: true
        type: string
    secrets:
      personal_access_token:
        required: true

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run Lint and Tests (Push/PR)
        if: github.event_name != 'workflow_call'
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          CREDENTIALS: ${{ secrets.CREDENTIALS }}
        run: uv run nox -s lint && uv run nox -s tests

      - name: Run Tests (Workflow Call)
        if: github.event_name == 'workflow_call'
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          CREDENTIALS: ${{ secrets.CREDENTIALS }}
        run: uv run nox -s tests

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.html
          retention-days: 90
